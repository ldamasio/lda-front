name: lda-front - Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lda-front-production
  cancel-in-progress: true

env:
  IMAGE_NAME: ldamasio/lda-prod
  INFRA_REPO: rbxrobotica/rbx-infra
  INFRA_APP: lda-prod

jobs:
  deploy_to_production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USER }}"
          test -n "${{ secrets.DOCKERHUB_PWD }}"
          test -n "${{ secrets.RBX_INFRA_TOKEN }}"

      - name: Set image tag
        id: tag
        run: echo "sha=sha-$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PWD }}

      - name: Build and push Docker frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify rbx-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.RBX_INFRA_TOKEN }}
          repository: ${{ env.INFRA_REPO }}
          event-type: image-updated
          client-payload: >-
            {"app":"${{ env.INFRA_APP }}","image":"${{ env.IMAGE_NAME }}","tag":"${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}","source_repo":"${{ github.repository }}","source_sha":"${{ github.sha }}"}
